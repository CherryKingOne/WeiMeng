<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OneFour - Design Workbench (Dark)</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            green: '#00C777',
                            darkGreen: '#00A361',
                            blue: '#007AFF',
                            bg: '#1C1C1E',        /* Dark Background */
                            panel: '#2C2C2E',     /* Panel Background */
                            border: '#3A3A3C',    /* Dark Borders */
                            text: '#FFFFFF',
                            textSec: '#9CA3AF'    /* Gray-400 */
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; overflow: hidden; background-color: #1C1C1E; }
        
        /* Dot Grid Background (Dark Mode) */
        .canvas-bg {
            background-color: #151516;
            background-image: radial-gradient(#333333 1.5px, transparent 1.5px);
            background-size: 24px 24px;
        }

        /* Custom Scrollbar (Dark) */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3A3A3C; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #4B5563; }

        /* Input Styles for Dark Mode */
        .dark-input {
            background-color: #1C1C1E;
            border-color: #3A3A3C;
            color: white;
        }
        .dark-input:focus {
            border-color: #00C777;
        }

        .tool-btn.active { background-color: rgba(0, 199, 119, 0.2); color: #00C777; }
        .tool-btn:hover:not(.active) { background-color: #3A3A3C; }
        
        .ai-glow { box-shadow: 0 0 15px rgba(0, 199, 119, 0.3); }
    </style>
</head>
<body class="bg-brand-bg text-brand-text h-screen flex flex-col">

    <!-- 1. TOP NAVIGATION BAR -->
    <header class="h-14 border-b border-brand-border flex items-center justify-between px-4 bg-brand-panel shrink-0 z-50">
        
        <!-- Left: Logo & Project Info -->
        <div class="flex items-center space-x-4 w-1/4">
            <a href="#" class="text-brand-green text-xl hover:opacity-80 transition">
                <i class="fas fa-cubes"></i>
            </a>
            <button class="text-brand-text hover:bg-brand-border p-2 rounded-md transition">
                <i class="fas fa-bars"></i>
            </button>
            <div class="flex items-center text-sm truncate">
                <span class="text-brand-textSec hidden xl:inline" data-i18n="breadcrumbs">My Project / E-Commerce ></span>
                <span class="font-semibold ml-1 cursor-pointer hover:bg-brand-border px-2 py-1 rounded" data-i18n="filename">Home Design</span>
                <i class="fas fa-cloud text-brand-green ml-2 text-xs" title="Saved"></i>
            </div>
        </div>

        <!-- Center: Tools -->
        <div class="flex items-center justify-center space-x-1 bg-brand-bg p-1 rounded-lg border border-brand-border">
            <button class="tool-btn active p-2 rounded transition w-9 h-9 flex items-center justify-center" title="Select (V)">
                <i class="fas fa-mouse-pointer text-xs"></i>
            </button>
            <button class="tool-btn p-2 rounded transition w-9 h-9 flex items-center justify-center" title="Text (T)">
                <i class="fas fa-font text-xs"></i>
            </button>
            <div class="relative group">
                <button class="tool-btn p-2 rounded transition w-9 h-9 flex items-center justify-center" title="Shape (R)">
                    <i class="far fa-square text-xs"></i>
                    <i class="fas fa-chevron-down text-[8px] ml-1 text-gray-500"></i>
                </button>
            </div>
            <button class="tool-btn p-2 rounded transition w-9 h-9 flex items-center justify-center" title="Artboard (A)">
                <i class="fas fa-crop-simple text-xs"></i>
            </button>
            <button class="tool-btn p-2 rounded transition w-9 h-9 flex items-center justify-center" title="Pen (P)">
                <i class="fas fa-pen-nib text-xs"></i>
            </button>
        </div>

        <!-- Right: AI & Collaboration -->
        <div class="flex items-center justify-end space-x-3 w-1/4">
             <!-- Language Switcher -->
             <button onclick="toggleLanguage()" class="text-xs font-medium text-brand-textSec hover:text-brand-green mr-2">
                EN / 中
            </button>

            <button class="bg-gradient-to-r from-brand-green to-emerald-600 text-white px-3 py-1.5 rounded-full flex items-center text-sm font-medium ai-glow hover:opacity-90 transition border border-transparent">
                <i class="fas fa-wand-magic-sparkles mr-2"></i> <span data-i18n="copilot">AI Copilot</span>
            </button>
            
            <div class="flex -space-x-2">
                <img src="https://i.pravatar.cc/150?img=1" class="w-8 h-8 rounded-full border-2 border-brand-panel" title="User A">
                <img src="https://i.pravatar.cc/150?img=5" class="w-8 h-8 rounded-full border-2 border-brand-panel" title="User B">
                <div class="w-8 h-8 rounded-full border-2 border-brand-panel bg-brand-border flex items-center justify-center text-xs text-brand-textSec cursor-pointer">+</div>
            </div>

            <div class="h-6 w-px bg-brand-border mx-2"></div>

            <button class="text-brand-textSec hover:text-brand-green transition"><i class="fas fa-play"></i></button>
            <button class="bg-brand-green/20 text-brand-green border border-brand-green px-4 py-1.5 rounded-md text-sm hover:bg-brand-green hover:text-white transition" data-i18n="share">Share</button>
        </div>
    </header>

    <!-- MAIN CONTENT WRAPPER -->
    <div class="flex flex-1 overflow-hidden">
        
        <!-- 2. LEFT SIDEBAR (Pages/Layers) -->
        <aside class="w-64 bg-brand-panel border-r border-brand-border flex flex-col shrink-0">
            <!-- Tabs -->
            <div class="flex border-b border-brand-border">
                <button class="flex-1 py-3 text-xs font-semibold text-brand-green border-b-2 border-brand-green" data-i18n="tab_pages">Pages</button>
                <button class="flex-1 py-3 text-xs font-semibold text-brand-textSec hover:text-brand-text" data-i18n="tab_layers">Layers</button>
                <button class="flex-1 py-3 text-xs font-semibold text-brand-textSec hover:text-brand-text" data-i18n="tab_assets">Assets</button>
            </div>
            
            <!-- List Content -->
            <div class="flex-1 overflow-y-auto p-2 space-y-1">
                <div class="flex items-center px-2 py-2 bg-brand-green/10 rounded text-sm font-medium text-brand-green cursor-pointer border border-brand-green/20">
                    <i class="far fa-file text-brand-green mr-2"></i> <span data-i18n="home_page">Home</span>
                </div>
                <div class="flex items-center px-2 py-2 hover:bg-brand-border rounded text-sm text-brand-textSec hover:text-white cursor-pointer transition">
                    <i class="far fa-file text-gray-600 mr-2"></i> <span data-i18n="product_page">Product Detail</span>
                </div>
                <div class="flex items-center px-2 py-2 hover:bg-brand-border rounded text-sm text-brand-textSec hover:text-white cursor-pointer transition">
                    <i class="far fa-file text-gray-600 mr-2"></i> <span data-i18n="checkout_page">Checkout</span>
                </div>
                <div class="flex items-center px-2 py-2 hover:bg-brand-border rounded text-sm text-brand-textSec hover:text-white cursor-pointer transition">
                    <i class="far fa-file text-gray-600 mr-2"></i> <span data-i18n="profile_page">Profile</span>
                </div>
            </div>

            <!-- Bottom Action -->
            <div class="p-3 border-t border-brand-border">
                <button class="w-full flex items-center justify-center py-2 text-sm text-brand-textSec hover:bg-brand-border hover:text-white rounded border border-dashed border-brand-border transition">
                    <i class="fas fa-plus mr-2"></i> <span data-i18n="new_page">New Page</span>
                </button>
            </div>
        </aside>

        <!-- 3. CENTER CANVAS (Infinite Canvas) -->
        <main class="flex-1 relative canvas-bg flex flex-col overflow-hidden">
            
            <!-- Canvas Controls -->
            <div class="absolute top-4 left-4 text-xs text-gray-500 font-mono">Artboard: Desktop 1440px</div>
            <div class="absolute top-4 right-4 bg-brand-panel shadow-lg border border-brand-border rounded-md flex items-center px-2 py-1 space-x-2">
                <button class="text-gray-400 hover:text-white"><i class="fas fa-minus"></i></button>
                <span class="text-xs font-medium min-w-[30px] text-center">100%</span>
                <button class="text-gray-400 hover:text-white"><i class="fas fa-plus"></i></button>
            </div>

            <!-- Central AI Prompt (Empty State) -->
            <div class="absolute inset-0 flex flex-col items-center justify-center z-10 pointer-events-none">
                <div class="pointer-events-auto text-center max-w-2xl w-full px-6 animate-fade-in-up">
                    <h1 class="text-3xl font-bold text-white mb-2" data-i18n="welcome_title">Hello, ready to create?</h1>
                    <p class="text-brand-textSec mb-8" data-i18n="welcome_sub">OneFour AI is standing by.</p>
                    
                    <!-- Magic Input -->
                    <div class="relative group">
                        <div class="absolute -inset-0.5 bg-gradient-to-r from-brand-green to-blue-600 rounded-xl blur opacity-40 group-hover:opacity-70 transition duration-200"></div>
                        <div class="relative bg-brand-panel rounded-xl shadow-2xl p-2 flex items-center border border-brand-border">
                            <i class="fas fa-sparkles text-brand-green text-xl ml-4 animate-pulse"></i>
                            <input type="text" class="w-full p-4 text-lg outline-none bg-transparent text-white placeholder-gray-600" data-placeholder="prompt_placeholder" placeholder="Describe the page you want to design (e.g., 'E-commerce Login')...">
                            <button class="bg-brand-green text-white rounded-lg px-6 py-2 font-medium hover:bg-brand-darkGreen transition">
                                <i class="fas fa-arrow-right"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Quick Actions -->
                    <div class="flex justify-center space-x-4 mt-6">
                        <button class="flex items-center px-4 py-2 bg-brand-panel border border-brand-border rounded-full text-sm text-brand-textSec hover:border-brand-green hover:text-brand-green transition shadow-md hover:bg-brand-bg">
                            <i class="fas fa-upload mr-2"></i> <span data-i18n="btn_sketch">Upload Sketch</span>
                        </button>
                        <button class="flex items-center px-4 py-2 bg-brand-panel border border-brand-border rounded-full text-sm text-brand-textSec hover:border-brand-green hover:text-brand-green transition shadow-md hover:bg-brand-bg">
                            <i class="fas fa-layer-group mr-2"></i> <span data-i18n="btn_template">Use Template</span>
                        </button>
                         <button class="flex items-center px-4 py-2 bg-brand-panel border border-brand-border rounded-full text-sm text-brand-textSec hover:border-brand-green hover:text-brand-green transition shadow-md hover:bg-brand-bg">
                            <i class="fas fa-dice mr-2"></i> <span data-i18n="btn_inspire">Random Idea</span>
                        </button>
                    </div>
                </div>
            </div>
        </main>

        <!-- 4. RIGHT SIDEBAR (Properties) -->
        <aside class="w-72 bg-brand-panel border-l border-brand-border flex flex-col shrink-0 z-20">
            <!-- Tabs -->
            <div class="flex border-b border-brand-border">
                <button class="flex-1 py-3 text-xs font-semibold text-white border-b-2 border-white" data-i18n="tab_design">Design</button>
                <button class="flex-1 py-3 text-xs font-semibold text-brand-textSec hover:text-white" data-i18n="tab_interaction">Interaction</button>
                <button class="flex-1 py-3 text-xs font-semibold text-brand-textSec hover:text-white" data-i18n="tab_comment">Comment</button>
            </div>

            <!-- Properties Content -->
            <div class="flex-1 overflow-y-auto p-4 space-y-6">
                
                <!-- Alignment -->
                <div>
                    <div class="flex justify-between mb-2 text-brand-textSec">
                        <button class="hover:text-white"><i class="fas fa-align-left"></i></button>
                        <button class="hover:text-white"><i class="fas fa-align-center"></i></button>
                        <button class="hover:text-white"><i class="fas fa-align-right"></i></button>
                        <span class="border-r border-gray-700 mx-1"></span>
                        <button class="hover:text-white"><i class="fas fa-align-justify"></i></button>
                        <button class="hover:text-white"><i class="fas fa-grip-lines"></i></button>
                    </div>
                </div>

                <!-- Position & Size -->
                <div class="grid grid-cols-2 gap-3">
                    <div class="flex items-center dark-input border rounded px-2 hover:border-brand-green group">
                        <span class="text-xs text-gray-500 mr-2 group-hover:text-brand-green">X</span>
                        <input type="text" value="0" class="w-full py-1.5 text-sm outline-none bg-transparent text-right text-gray-300">
                    </div>
                    <div class="flex items-center dark-input border rounded px-2 hover:border-brand-green group">
                        <span class="text-xs text-gray-500 mr-2 group-hover:text-brand-green">Y</span>
                        <input type="text" value="0" class="w-full py-1.5 text-sm outline-none bg-transparent text-right text-gray-300">
                    </div>
                    <div class="flex items-center dark-input border rounded px-2 hover:border-brand-green group">
                        <span class="text-xs text-gray-500 mr-2 group-hover:text-brand-green">W</span>
                        <input type="text" value="1440" class="w-full py-1.5 text-sm outline-none bg-transparent text-right text-gray-300">
                    </div>
                    <div class="flex items-center dark-input border rounded px-2 hover:border-brand-green group">
                        <span class="text-xs text-gray-500 mr-2 group-hover:text-brand-green">H</span>
                        <input type="text" value="900" class="w-full py-1.5 text-sm outline-none bg-transparent text-right text-gray-300">
                    </div>
                </div>

                <!-- Fill (AI Enhanced) -->
                <div class="border-t border-brand-border pt-4">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-xs font-bold text-white" data-i18n="prop_fill">Fill</span>
                        <button class="text-brand-green text-xs hover:bg-white/10 p-1 rounded" title="AI Color Suggestion">
                            <i class="fas fa-wand-magic-sparkles"></i>
                        </button>
                    </div>
                    <div class="flex items-center space-x-2">
                        <div class="w-8 h-8 bg-brand-bg border border-brand-border rounded shadow-sm"></div>
                        <input type="text" value="#1C1C1E" class="flex-1 dark-input border rounded px-2 py-1 text-sm text-gray-300 uppercase">
                        <span class="text-xs text-gray-500">100%</span>
                    </div>
                </div>

                <!-- Interactions Preview (AI Enhanced) -->
                <div class="border-t border-brand-border pt-4">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-xs font-bold text-white" data-i18n="prop_interactions">Interactions</span>
                        <button class="text-brand-textSec hover:text-white"><i class="fas fa-plus"></i></button>
                    </div>
                    
                    <div class="bg-brand-bg rounded p-3 border border-dashed border-brand-border text-center cursor-pointer hover:border-brand-green group transition">
                        <i class="fas fa-bolt text-gray-600 mb-1 group-hover:text-brand-green"></i>
                        <p class="text-xs text-gray-500" data-i18n="interaction_prompt">Select an element to add interactions or ask AI.</p>
                    </div>
                </div>

            </div>
        </aside>
    </div>

    <!-- Translation Script -->
    <script>
        const translations = {
            en: {
                breadcrumbs: "My Project / E-Commerce >",
                filename: "Home Design",
                copilot: "AI Copilot",
                share: "Share",
                tab_pages: "Pages",
                tab_layers: "Layers",
                tab_assets: "Assets",
                home_page: "Home",
                product_page: "Product Detail",
                checkout_page: "Checkout",
                profile_page: "Profile",
                new_page: "New Page",
                welcome_title: "Hello, ready to create?",
                welcome_sub: "OneFour AI is standing by.",
                prompt_placeholder: "Describe the page you want to design (e.g., 'E-commerce Login')...",
                btn_sketch: "Upload Sketch",
                btn_template: "Use Template",
                btn_inspire: "Random Idea",
                tab_design: "Design",
                tab_interaction: "Interaction",
                tab_comment: "Comment",
                prop_fill: "Fill",
                prop_interactions: "Interactions",
                interaction_prompt: "Select an element to add interactions or ask AI."
            },
            zh: {
                breadcrumbs: "我的项目 / 电商App >",
                filename: "首页设计",
                copilot: "AI 副驾驶",
                share: "分享",
                tab_pages: "页面",
                tab_layers: "图层",
                tab_assets: "资产",
                home_page: "首页",
                product_page: "商品详情页",
                checkout_page: "结账页",
                profile_page: "个人中心",
                new_page: "新建页面",
                welcome_title: "你好，准备好创造了吗？",
                welcome_sub: "OneFour AI 随时待命。",
                prompt_placeholder: "请描述你想要设计的页面（例如：“电商登录页”）...",
                btn_sketch: "上传草图",
                btn_template: "使用模板",
                btn_inspire: "随机灵感",
                tab_design: "设计",
                tab_interaction: "交互",
                tab_comment: "评论",
                prop_fill: "填充",
                prop_interactions: "交互动作",
                interaction_prompt: "选中元素添加交互，或向 AI 提问。"
            }
        };

        let currentLang = 'en';

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'zh' : 'en';
            const elements = document.querySelectorAll('[data-i18n]');
            elements.forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[currentLang][key]) {
                    el.textContent = translations[currentLang][key];
                }
            });

            const inputs = document.querySelectorAll('[data-placeholder]');
            inputs.forEach(input => {
                const key = input.getAttribute('data-placeholder');
                if (translations[currentLang][key]) {
                    input.placeholder = translations[currentLang][key];
                }
            });
        }
    </script>
</body>
</html>
