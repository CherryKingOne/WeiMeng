services:
  weimeng-api:
    build: .
    container_name: weimeng-api
    ports:
      - "5607:5607"
    environment:
      # Database connection (internal docker network)
      - POSTGRESQL_HOST=weimeng-postgre
      - POSTGRESQL_PORT=5432
      - POSTGRESQL_USER=weimeng
      - POSTGRESQL_PASSWORD=weimeng
      - POSTGRESQL_DB=weimeng
      # Redis connection (internal docker network)
      - REDIS_HOST=weimeng-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=weimeng
      # MinIO connection (internal docker network)
      - MINIO_ENDPOINT=weimeng-minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-weimengminio}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-weimengminio}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME:-scripts}
      - MINIO_SECURE=False
      # Elasticsearch
      - ELASTICSEARCH_URL=${ELASTICSEARCH_URL:-http://weimeng-es:9200/}
      - ELASTICSEARCH_SCRIPT_CHUNK_INDEX=${ELASTICSEARCH_SCRIPT_CHUNK_INDEX:-script_chunks}
      # App Settings
      - APP_ENV=development
    env_file:
      - .env
    depends_on:
      - weimeng-postgre
      - weimeng-redis
      - weimeng-minio
      - weimeng-es
    volumes:
      - .:/app

  weimeng-postgre:
    image: vmengs/postgres:latest
    container_name: weimeng-postgre
    environment:
      - POSTGRES_USER=weimeng
      - POSTGRES_PASSWORD=weimeng
      - POSTGRES_DB=weimeng
    ports:
      - "5400:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  weimeng-redis:
    image: vmengs/redis:latest
    container_name: weimeng-redis
    command: redis-server --requirepass weimeng
    ports:
      - "6300:6379"
    volumes:
      - redis_data:/data

  weimeng-minio:
    image: vmengs/minio:latest
    container_name: weimeng-minio
    command: server /data --console-address ":7056"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-weimengminio}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-weimengminio}
    ports:
      - "5726:9000"
      - "7056:7056"
    volumes:
      - minio_data:/data

  weimeng-es:
    image: vmengs/elasticsearch:latest
    container_name: weimeng-es
    ports:
      - "7260:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

volumes:
  postgres_data:
  redis_data:
  minio_data:
  es_data:
