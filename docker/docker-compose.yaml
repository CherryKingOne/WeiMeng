services:
  api:
    image: ${API_IMAGE:-vmengs/weimeng-api:0.0.1}
    restart: unless-stopped
    ports:
      - "${API_PORT:-5607}:5607"
    environment:
      - POSTGRESQL_HOST=postgres
      - POSTGRESQL_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=minio:9000
      - ELASTICSEARCH_URL=http://elasticsearch:9200/
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - minio
      - elasticsearch
    networks:
      - weimeng-network

  web:
    image: ${WEB_IMAGE:-vmengs/weimeng-web:0.0.1}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5678}:5678"
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - PORT=5678
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api/v1}
      - SERVER_API_URL=${SERVER_API_URL:-http://api:5607/api/v1}
    depends_on:
      - api
    networks:
      - weimeng-network

  postgres:
    image: ${POSTGRES_IMAGE:-vmengs/postgres:latest}
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRESQL_USER:-weimeng}
      - POSTGRES_PASSWORD=${POSTGRESQL_PASSWORD:-weimeng}
      - POSTGRES_DB=${POSTGRESQL_DB:-weimeng}
    ports:
      - "127.0.0.1:${POSTGRES_EXPOSE_PORT:-5400}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres:/docker-entrypoint-initdb.d:ro
    networks:
      - weimeng-network

  redis:
    image: ${REDIS_IMAGE:-vmengs/redis:latest}
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-weimeng}
    ports:
      - "127.0.0.1:${REDIS_EXPOSE_PORT:-6300}:6379"
    volumes:
      - redis_data:/data
      - ./redis:/usr/local/etc/redis:ro
    networks:
      - weimeng-network

  minio:
    image: ${MINIO_IMAGE:-vmengs/minio:latest}
    restart: unless-stopped
    command: server /data --console-address ":7056"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-weimengminio}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-weimengminio}
    ports:
      - "127.0.0.1:${MINIO_EXPOSE_PORT:-5726}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_EXPOSE_PORT:-7056}:7056"
    volumes:
      - minio_data:/data
    networks:
      - weimeng-network

  elasticsearch:
    image: ${ELASTICSEARCH_IMAGE:-vmengs/elasticsearch:latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${ELASTICSEARCH_EXPOSE_PORT:-7260}:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - weimeng-network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  es_data:

networks:
  weimeng-network:
    driver: bridge
