version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: weimeng_postgres
    environment:
      POSTGRES_DB: weimeng
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_password_here
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - weimeng_network

  minio:
    image: minio/minio:RELEASE.2025-06-13T11-33-47Z-cpuv1
    container_name: weimeng_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: weimeng
      MINIO_ROOT_PASSWORD: weimeng.
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: always
    networks:
      - weimeng_network

volumes:
  postgres_data:
  minio_data:

networks:
  weimeng_network:
    driver: bridge
