<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Language</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Google Fonts (Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style type="text/tailwindcss">
        body {
            font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #F8F9FA; /* A light grey background to make the modal pop */
            color: #1A1A1A;
        }
        /* Defining custom colors based on the provided design philosophy */
        .bg-brand-blue { background-color: #007AFF; }
        .text-brand-blue { color: #007AFF; }
        
        .bg-light-gray { background-color: #F2F2F7; }
        .border-light-gray { border-color: #E5E5EA; }

        .text-primary { color: #1A1A1A; }
        .text-secondary { color: #8E8E93; }
    </style>
</head>
<body class="antialiased p-8">

    <div class="max-w-7xl mx-auto bg-white rounded-2xl shadow-lg flex min-h-[90vh] overflow-hidden">
        <!-- Left Sidebar -->
        <aside class="w-64 bg-white border-r border-light-gray p-4">
            <h2 class="text-xl font-bold text-primary px-4 pt-4 pb-6">设置</h2>
            <nav class="flex flex-col space-y-1">
                <a href="#" class="flex items-center px-4 py-2.5 text-secondary rounded-lg hover:bg-light-gray hover:text-primary transition-colors">
                    <i class="fas fa-briefcase w-6 text-center"></i>
                    <span class="ml-3 font-medium">工作空间</span>
                </a>
                <a href="#" class="flex items-center px-4 py-2.5 text-secondary rounded-lg hover:bg-light-gray hover:text-primary transition-colors">
                    <i class="fas fa-sliders-h w-6 text-center"></i>
                    <span class="ml-3 font-medium">模型供应商</span>
                </a>
                <a href="#" class="flex items-center px-4 py-2.5 text-secondary rounded-lg hover:bg-light-gray hover:text-primary transition-colors">
                    <i class="fas fa-users w-6 text-center"></i>
                    <span class="ml-3 font-medium">成员</span>
                </a>
                <a href="#" class="flex items-center px-4 py-2.5 text-secondary rounded-lg hover:bg-light-gray hover:text-primary transition-colors">
                    <i class="fas fa-database w-6 text-center"></i>
                    <span class="ml-3 font-medium">数据来源</span>
                </a>
                <a href="#" class="flex items-center px-4 py-2.5 text-secondary rounded-lg hover:bg-light-gray hover:text-primary transition-colors">
                    <i class="fas fa-puzzle-piece w-6 text-center"></i>
                    <span class="ml-3 font-medium">API 扩展</span>
                </a>
                 <div class="pt-4">
                    <h3 class="px-4 text-xs font-semibold text-gray-400 uppercase">通用</h3>
                </div>
                <a href="#" class="flex items-center px-4 py-2.5 text-primary bg-light-gray rounded-lg font-semibold transition-colors">
                    <i class="fas fa-language w-6 text-center"></i>
                    <span class="ml-3">语言</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 bg-white relative">
            <div class="absolute top-6 right-6 text-center">
                 <button class="w-8 h-8 flex items-center justify-center bg-light-gray rounded-full text-secondary hover:text-primary hover:bg-gray-200 transition-colors">
                    <i class="fas fa-times"></i>
                </button>
                <span class="text-xs text-secondary mt-1 block">ESC</span>
            </div>

            <div class="p-10 max-w-2xl">
                <h1 class="text-2xl font-bold text-primary mb-10">语言</h1>
                
                <div class="space-y-8">
                    <!-- Language Setting -->
                    <div>
                        <h2 class="text-sm font-semibold text-secondary mb-3">界面语言</h2>
                        <div class="bg-light-gray rounded-lg px-4 py-3 flex justify-between items-center cursor-pointer">
                            <span class="text-primary font-medium">简体中文</span>
                            <button class="text-secondary hover:text-primary">
                                <i class="fas fa-times text-sm"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Timezone Setting -->
                    <div>
                        <h2 class="text-sm font-semibold text-secondary mb-3">时区</h2>
                         <div class="bg-light-gray rounded-lg px-4 py-3 flex justify-between items-center cursor-pointer">
                            <span class="text-primary font-medium">-05:00 Eastern Time - New York City, Brooklyn, Queens, Philadelphia</span>
                            <button class="text-secondary hover:text-primary">
                                <i class="fas fa-times text-sm"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
