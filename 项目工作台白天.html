<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Workspace - OneFour</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Google Fonts (Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style type="text/tailwindcss">
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Defining custom colors based on the design philosophy */
        .bg-brand-green { background-color: #00C777; }
        .text-brand-green { color: #00C777; }
        .border-brand-green { border-color: #00C777; }
        .hover\:bg-brand-green-dark:hover { background-color: #00A361; }
        
        .bg-brand-blue { background-color: #007AFF; }
        .text-brand-blue { color: #007AFF; }
        
        .bg-light-gray { background-color: #F2F2F7; }
        .text-primary { color: #1A1A1A; }
        .text-secondary { color: #8E8E93; }

        /* Custom transition for project cards */
        .project-card {
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        }
        .project-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body class="bg-light-gray antialiased">

    <div class="flex h-screen text-primary">
        <!-- 2. Left Sidebar - Main Navigation -->
        <aside class="w-64 flex-shrink-0 bg-white border-r border-gray-200 flex flex-col">
            <!-- Logo area in sidebar -->
            <div class="h-16 flex items-center px-6 border-b border-gray-200">
                 <a href="#" class="text-2xl font-bold text-primary flex items-center">
                    <i class="fas fa-cubes text-brand-green mr-2"></i>
                    OneFour
                </a>
            </div>

            <div class="p-4 space-y-4 flex-grow">
                <!-- Primary CTA -->
                <a href="#smart-create-modal" class="flex items-center justify-center w-full bg-brand-green text-white font-semibold px-4 py-3 rounded-lg hover:bg-brand-green-dark transition-colors shadow-sm hover:shadow-md">
                    <i class="fas fa-plus mr-2"></i>
                    新建项目
                </a>
                
                <!-- Navigation Items -->
                <nav class="mt-6 space-y-1">
                    <a href="#" class="flex items-center px-3 py-2 text-secondary hover:bg-gray-100 rounded-md transition-colors">
                        <i class="fas fa-clock w-6 text-center"></i>
                        <span class="ml-3 font-medium">最近浏览</span>
                    </a>
                    <a href="#" class="flex items-center px-3 py-2 font-semibold bg-brand-green/10 text-brand-green rounded-md">
                        <i class="fas fa-file w-6 text-center"></i>
                        <span class="ml-3">我的草稿</span>
                    </a>
                    <a href="#" class="flex items-center px-3 py-2 text-secondary hover:bg-gray-100 rounded-md transition-colors">
                        <i class="fas fa-lightbulb w-6 text-center"></i>
                        <span class="ml-3 font-medium">AI灵感中心</span>
                    </a>
                    <a href="#" class="flex items-center px-3 py-2 text-secondary hover:bg-gray-100 rounded-md transition-colors">
                        <i class="fas fa-star w-6 text-center"></i>
                        <span class="ml-3 font-medium">收藏夹</span>
                    </a>
                </nav>

                <!-- Team Spaces -->
                <div class="pt-6">
                    <h5 class="px-3 text-xs font-semibold uppercase text-gray-400">团队空间</h5>
                    <nav class="mt-2 space-y-1">
                         <a href="#" class="flex items-center px-3 py-2 text-secondary hover:bg-gray-100 rounded-md transition-colors">
                            <span class="w-6 text-center"><i class="fas fa-users"></i></span>
                            <span class="ml-3 font-medium">UX 部门</span>
                        </a>
                         <a href="#" class="flex items-center px-3 py-2 text-secondary hover:bg-gray-100 rounded-md transition-colors">
                            <span class="w-6 text-center"><i class="fas fa-shopping-cart"></i></span>
                            <span class="ml-3 font-medium">电商项目组</span>
                        </a>
                        <a href="#" class="flex items-center px-3 py-2 text-gray-400 hover:text-primary rounded-md transition-colors">
                            <i class="fas fa-plus-circle w-6 text-center"></i>
                            <span class="ml-3 font-medium text-sm">创建新团队</span>
                        </a>
                    </nav>
                </div>
            </div>

            <!-- Sidebar Footer -->
            <div class="p-4 border-t border-gray-200">
                 <a href="#" class="flex items-center px-3 py-2 text-secondary hover:bg-gray-100 rounded-md transition-colors">
                    <i class="fas fa-trash w-6 text-center"></i>
                    <span class="ml-3 font-medium">回收站</span>
                </a>
                <div class="mt-4 p-3 bg-brand-green/10 rounded-lg text-center">
                    <p class="text-sm font-semibold text-brand-green">解锁更多AI功能</p>
                    <a href="#" class="text-xs text-brand-green/80 hover:underline">立即升级到Pro</a>
                </div>
            </div>
        </aside>

        <!-- Main Area -->
        <div class="flex-1 flex flex-col">
            <!-- 1. Top Header - Global Actions -->
            <header class="h-16 bg-white/80 backdrop-blur-lg border-b border-gray-200 flex items-center justify-between px-8">
                <!-- Global Search Bar -->
                <div class="relative w-full max-w-md">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" placeholder="搜索项目、团队或AI组件库..." class="w-full bg-light-gray border border-transparent focus:bg-white focus:border-brand-green focus:ring-2 focus:ring-brand-green/20 rounded-lg py-2 pl-11 pr-4 transition-all">
                </div>

                <!-- Right side icons & user avatar -->
                <div class="flex items-center space-x-6">
                    <button class="text-gray-500 hover:text-primary transition-colors">
                        <i class="fas fa-question-circle fa-lg"></i>
                    </button>
                    <button class="relative text-gray-500 hover:text-primary transition-colors">
                        <i class="fas fa-bell fa-lg"></i>
                        <span class="absolute -top-1 -right-1 h-2 w-2 bg-red-500 rounded-full"></span>
                    </button>
                    <div class="relative">
                        <button class="flex items-center space-x-2">
                            <img src="https://i.pravatar.cc/40?u=a042581f4e29026704d" alt="User Avatar" class="w-8 h-8 rounded-full border-2 border-transparent hover:border-brand-green transition-all">
                        </button>
                        <!-- Dropdown menu would go here -->
                    </div>
                </div>
            </header>

            <!-- 3. Main Content Area - Workspace -->
            <main class="flex-1 p-8 overflow-y-auto">
                <!-- Content Header -->
                <div class="flex justify-between items-center mb-8">
                    <div>
                        <span class="text-sm text-secondary">个人空间</span>
                        <h1 class="text-3xl font-bold text-primary">我的草稿</h1>
                    </div>
                    <div class="flex items-center space-x-2">
                         <div class="flex items-center bg-white p-1 rounded-lg border border-gray-200">
                             <button class="px-3 py-1 text-sm font-semibold text-white bg-brand-green rounded-md"><i class="fas fa-th-large"></i></button>
                             <button class="px-3 py-1 text-sm text-secondary hover:text-primary"><i class="fas fa-list"></i></button>
                         </div>
                         <button class="px-4 py-2 bg-white border border-gray-200 rounded-lg text-sm font-medium hover:bg-gray-50">
                             最后修改 <i class="fas fa-chevron-down ml-2 text-xs"></i>
                         </button>
                    </div>
                </div>

                <!-- Project List Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                    
                    <!-- Project Card 1 -->
                    <div class="bg-white rounded-lg shadow-sm border border-gray-200 project-card relative">
                        <a href="#">
                            <div class="aspect-video bg-gray-100 rounded-t-lg overflow-hidden">
                                <img src="https://images.unsplash.com/photo-1618788372246-79faff0c3742?q=80&w=800&auto=format&fit=crop" class="w-full h-full object-cover" alt="Project thumbnail">
                            </div>
                            <div class="p-4">
                                <h3 class="font-semibold text-primary truncate">电商平台重构</h3>
                                <p class="text-sm text-secondary mt-1">修改于：2小时前</p>
                            </div>
                        </a>
                        <button class="absolute top-3 right-3 w-8 h-8 rounded-full text-gray-500 hover:bg-gray-200 flex items-center justify-center">
                            <i class="fas fa-ellipsis-h"></i>
                        </button>
                    </div>

                    <!-- Project Card 2 -->
                    <div class="bg-white rounded-lg shadow-sm border border-gray-200 project-card relative">
                        <a href="#">
                            <div class="aspect-video bg-gray-100 rounded-t-lg overflow-hidden">
                                <img src="https://images.unsplash.com/photo-1581287053822-fd7bf4f4bf3f?q=80&w=800&auto=format&fit=crop" class="w-full h-full object-cover" alt="Project thumbnail">
                            </div>
                            <div class="p-4">
                                <h3 class="font-semibold text-primary truncate">移动端健康App</h3>
                                <p class="text-sm text-secondary mt-1">修改于：昨天</p>
                            </div>
                        </a>
                        <button class="absolute top-3 right-3 w-8 h-8 rounded-full text-gray-500 hover:bg-gray-200 flex items-center justify-center">
                            <i class="fas fa-ellipsis-h"></i>
                        </button>
                    </div>

                    <!-- Add New Project Card (alternative CTA) -->
                    <a href="#smart-create-modal" class="border-2 border-dashed border-gray-300 rounded-lg flex flex-col items-center justify-center text-gray-500 hover:border-brand-green hover:text-brand-green transition-colors project-card">
                        <i class="fas fa-plus text-3xl"></i>
                        <span class="mt-2 font-semibold">创建新项目</span>
                    </a>

                    <!-- Empty State (Uncomment if no projects exist) -->
                    <!-- 
                    <div class="col-span-full flex flex-col items-center justify-center py-20 bg-white rounded-lg">
                        <i class="fas fa-rocket text-5xl text-brand-green mb-4"></i>
                        <h2 class="text-2xl font-bold text-primary">开始您的第一个AI设计项目吧！</h2>
                        <p class="mt-2 max-w-md text-center text-secondary">从一段描述、一张草图开始，或者探索AI灵感中心，看看OneFour能为您做些什么。</p>
                        <a href="#smart-create-modal" class="mt-6 bg-brand-green text-white font-semibold px-6 py-3 rounded-lg hover:bg-brand-green-dark transition-colors">
                            <i class="fas fa-plus mr-2"></i>
                            新建项目
                        </a>
                    </div>
                    -->
                    
                </div>
            </main>
        </div>
    </div>
    
    <!-- Core Interaction: Smart Create Modal (Initially hidden) -->
    <!-- Add 'hidden' class to hide, remove to show -->
    <div id="smart-create-modal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl transform transition-all">
            <div class="p-6 border-b flex justify-between items-center">
                <h2 class="text-xl font-bold text-primary">用 AI 开启新项目</h2>
                <button class="text-gray-400 hover:text-primary">&times;</button>
            </div>
            <div class="p-6">
                <!-- Tabs -->
                <div class="flex border-b mb-6">
                    <button class="px-4 py-2 text-sm font-semibold border-b-2 border-brand-green text-brand-green">从文本描述生成</button>
                    <button class="px-4 py-2 text-sm font-medium text-secondary hover:text-primary">从草图/图片生成</button>
                    <button class="px-4 py-2 text-sm font-medium text-secondary hover:text-primary">从模板开始</button>
                    <button class="px-4 py-2 text-sm font-medium text-secondary hover:text-primary">创建空白项目</button>
                </div>
                <!-- Tab Content -->
                <div>
                    <label for="ai-prompt" class="font-medium text-primary">描述您的原型</label>
                    <textarea id="ai-prompt" rows="5" class="mt-2 w-full p-3 border border-gray-300 rounded-lg focus:border-brand-green focus:ring-2 focus:ring-brand-green/20" placeholder="例如：一个带有顶部导航、轮播图和商品卡片列表的电商首页，风格要简约现代..."></textarea>
                </div>
            </div>
            <div class="p-6 bg-gray-50 rounded-b-xl flex justify-end">
                <button class="bg-brand-green text-white font-semibold px-6 py-2.5 rounded-lg hover:bg-brand-green-dark transition-colors">生成原型</button>
            </div>
        </div>
    </div>

</body>
</html>
